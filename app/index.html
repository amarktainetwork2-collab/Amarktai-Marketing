<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmarktAI Marketing — Autonomous AI Social Media Platform</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AmarktAI" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- SEO / OG -->
    <meta name="description" content="Autonomous AI-powered social media marketing platform. Generate, schedule, and publish content across 12+ channels with AI." />
    <meta property="og:title" content="AmarktAI Marketing" />
    <meta property="og:description" content="Autonomous AI social media marketing. Part of AmarktAI Network." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Register Service Worker for PWA / offline support -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then(function (reg) {
              console.log('[SW] Registered:', reg.scope);
            })
            .catch(function (err) {
              console.warn('[SW] Registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
