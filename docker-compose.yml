version: '3.8'

services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: amarktai
      POSTGRES_USER: amarktai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amarktai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://amarktai:${POSTGRES_PASSWORD:-changeme}@db:5432/amarktai
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","https://${DOMAIN:-localhost}","https://marketing.amarktai.com"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Celery Worker ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://amarktai:${POSTGRES_PASSWORD:-changeme}@db:5432/amarktai
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_uploads:/app/uploads

  # ─── Celery Beat (Scheduler) ──────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://amarktai:${POSTGRES_PASSWORD:-changeme}@db:5432/amarktai
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── React/Vite Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./app
      dockerfile: ../Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

  # ─── Certbot (SSL) ───────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    profiles:
      - ssl
    volumes:
      - ssl_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    command: >
      certonly --webroot --webroot-path /var/www/certbot
      --email ${ADMIN_EMAIL:-admin@example.com}
      --agree-tos --no-eff-email
      -d ${DOMAIN:-localhost}

volumes:
  postgres_data:
  redis_data:
  media_uploads:
  ssl_certs:
  certbot_webroot:
