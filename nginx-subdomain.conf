# ============================================================
# Nginx configuration for:
#   marketing.amarktai.com
#
# Deploy this file to:
#   /etc/nginx/sites-available/amarktai-marketing
#
# Enable with:
#   sudo ln -s /etc/nginx/sites-available/amarktai-marketing \
#              /etc/nginx/sites-enabled/amarktai-marketing
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (Let's Encrypt):
#   sudo certbot --nginx -d marketing.amarktai.com
# ============================================================

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name marketing.amarktai.com;

    # Let's Encrypt / Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other HTTP traffic → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS main block ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name marketing.amarktai.com;

    # SSL — managed by Certbot (paths written automatically after certbot run)
    ssl_certificate     /etc/letsencrypt/live/marketing.amarktai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marketing.amarktai.com/privkey.pem;

    # Modern TLS only
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "SAMEORIGIN"                                    always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    # Logging
    access_log /var/log/nginx/amarktai-marketing.access.log;
    error_log  /var/log/nginx/amarktai-marketing.error.log warn;

    # Upload limit (media files)
    client_max_body_size 50M;

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── API rate limiting zone ──────────────────────────────────────────────
    # Defined in /etc/nginx/nginx.conf http block:
    #   limit_req_zone $binary_remote_addr zone=amarktai_api:10m rate=30r/m;

    # ── Backend API proxy ───────────────────────────────────────────────────
    location /api/ {
        limit_req zone=amarktai_api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ── FastAPI docs (restrict in production as needed) ────────────────────
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ── Frontend static files (Vite build output) ──────────────────────────
    # Option A — Nginx serves the built dist/ folder directly (fastest)
    root /var/www/amarktai-marketing/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Option B — Proxy to a running Node/Vite preview server ────────────
    # (Comment out the root/index/location / above and uncomment this block)
    # location / {
    #     proxy_pass         http://127.0.0.1:4173;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade           $http_upgrade;
    #     proxy_set_header   Connection        "upgrade";
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }

    # ── Static asset caching ───────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
